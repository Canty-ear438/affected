name: 'Affected PR Comment'
description: 'Post a comment on pull requests showing which packages are affected by the changes and why'
branding:
  icon: 'message-square'
  color: 'blue'

inputs:
  base:
    description: 'Base branch to compare against'
    required: false
    default: 'origin/main'
  version:
    description: 'affected CLI version to install'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}
  header:
    description: 'Unique identifier for the comment (used for updating existing comments)'
    required: false
    default: 'affected-packages'

runs:
  using: 'composite'
  steps:
    - name: Install affected
      uses: Rani367/setup-affected@v1
      with:
        version: ${{ inputs.version }}
        token: ${{ inputs.token }}

    - name: Detect affected packages
      id: detect
      shell: bash
      run: |
        # Run affected list with explain and JSON output
        JSON=$(affected list --merge-base "${{ inputs.base }}" --explain --json 2>/dev/null || echo '{"affected":[],"total_packages":0,"changed_files":0}')
        echo "json<<EOF" >> "$GITHUB_OUTPUT"
        echo "$JSON" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Format and post comment
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        HEADER: ${{ inputs.header }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        JSON='${{ steps.detect.outputs.json }}'

        AFFECTED_COUNT=$(echo "$JSON" | jq -r '.affected | length')
        TOTAL_PACKAGES=$(echo "$JSON" | jq -r '.total_packages')
        CHANGED_FILES=$(echo "$JSON" | jq -r '.changed_files')

        MARKER="<!-- ${HEADER} -->"

        if [ "$AFFECTED_COUNT" -eq 0 ]; then
          BODY="${MARKER}
        ## Affected Packages

        No packages affected by this change."
        else
          # Build the table rows
          TABLE_ROWS=""
          for i in $(seq 0 $(( AFFECTED_COUNT - 1 ))); do
            PKG=$(echo "$JSON" | jq -r ".explanations[$i].package")
            TYPE=$(echo "$JSON" | jq -r ".explanations[$i].reason.type")

            if [ "$TYPE" = "DirectlyChanged" ]; then
              FILES=$(echo "$JSON" | jq -r ".explanations[$i].reason.files | map(\"\`\" + . + \"\`\") | join(\", \")")
              REASON="directly changed: ${FILES}"
            else
              CHAIN=$(echo "$JSON" | jq -r ".explanations[$i].reason.chain | join(\" -> \")")
              REASON="depends on: ${CHAIN}"
            fi

            TABLE_ROWS="${TABLE_ROWS}
        | **${PKG}** | ${REASON} |"
          done

          # Build changed files list
          CHANGED_LIST=$(echo "$JSON" | jq -r '
            if .explanations then
              [.explanations[] | select(.reason.type == "DirectlyChanged") | .reason.files[]] | unique | map("- `" + . + "`") | join("\n")
            else
              ""
            end
          ')

          BODY="${MARKER}
        ## Affected Packages (${AFFECTED_COUNT} of ${TOTAL_PACKAGES})

        | Package | Reason |
        |---------|--------|${TABLE_ROWS}

        <details><summary>${CHANGED_FILES} file(s) changed</summary>

        ${CHANGED_LIST}

        </details>

        ---
        *Generated by [affected](https://github.com/Rani367/affected)*"
        fi

        # Find existing comment with our marker
        COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          2>/dev/null | head -1)

        if [ -n "$COMMENT_ID" ]; then
          # Update existing comment
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH \
            -f body="$BODY" \
            --silent
          echo "Updated existing comment #${COMMENT_ID}"
        else
          # Create new comment
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="$BODY" \
            --silent
          echo "Posted new comment on PR #${PR_NUMBER}"
        fi
